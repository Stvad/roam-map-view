name: Deploy GitHub Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension bundle
        run: npm run build

      - name: Prepare site artifact
        run: |
          mkdir -p site
          cp extension.js site/
          cp README.md site/
          if [ -f extension.js.map ]; then cp extension.js.map site/; fi
          touch site/.nojekyll
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Roam Map View</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 40px; line-height: 1.5; }
              code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; }
              ul { padding-left: 18px; }
            </style>
          </head>
          <body>
            <h1>Roam Map View</h1>
            <p>Published extension artifacts:</p>
            <ul>
              <li><a href="./extension.js"><code>extension.js</code></a></li>
              <li><a href="./extension.js.map"><code>extension.js.map</code></a> (if present)</li>
              <li><a href="./README.md"><code>README.md</code></a></li>
            </ul>
          </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
